name: Validate Registry
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate index and metadata
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import re
          import sys

          index_path = pathlib.Path('index.json')
          index = json.loads(index_path.read_text(encoding='utf-8'))

          assert index.get('schemaVersion'), 'Missing schemaVersion'
          assert isinstance(index.get('extensions'), list), 'Missing extensions array'

          ids = []
          for ext in index['extensions']:
              if set(ext.keys()) != {'id'}:
                  raise AssertionError(f'index entry must contain only id: {ext}')
              ids.append(ext['id'])
          if len(ids) != len(set(ids)):
              raise AssertionError('Duplicate extension IDs in index.json')

          meta_ids = []
          errors = []
          for meta_path in sorted(pathlib.Path('extensions').glob('*/metadata.json')):
              ext_id = meta_path.parent.name
              meta = json.loads(meta_path.read_text(encoding='utf-8'))
              meta_ids.append(ext_id)

              if meta.get('id') != ext_id:
                  errors.append(f'{ext_id}: metadata id mismatch')

              versions = meta.get('versions', [])
              if not versions:
                  errors.append(f'{ext_id}: metadata has no versions')
                  continue

              for v in versions:
                  if not v.get('version'):
                      errors.append(f'{ext_id}: version entry missing version string')
                  if not v.get('downloadUrl'):
                      errors.append(f"{ext_id}: version {v.get('version') or '?'} missing downloadUrl")

                  checksum = (v.get('checksum') or '').strip()
                  if not checksum:
                      errors.append(f"{ext_id}: version {v.get('version') or '?'} missing checksum")
                      continue

                  if checksum.lower().startswith('sha256:'):
                      checksum = checksum[7:]
                  if not re.fullmatch(r'[A-Fa-f0-9]{64}', checksum):
                      errors.append(f"{ext_id}: version {v.get('version') or '?'} has invalid checksum format")

              has_summary = all(meta.get(k) for k in ['name', 'description', 'author'])
              if not has_summary and not meta.get('sourceManifestUrl'):
                  errors.append(f'{ext_id}: provide summary fields or sourceManifestUrl')

          if set(ids) != set(meta_ids):
              errors.append(f'index IDs and metadata IDs mismatch (index={sorted(set(ids))}, metadata={sorted(set(meta_ids))})')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)

          print(f'Validated {len(meta_ids)} metadata files and {len(ids)} index entries')
          PY

      - name: Verify release assets and checksums (strict)
        run: |
          python3 <<'PY'
          import hashlib
          import json
          import pathlib
          import re
          import sys
          import urllib.request

          errors = []
          for meta_path in sorted(pathlib.Path('extensions').glob('*/metadata.json')):
              ext_id = meta_path.parent.name
              meta = json.loads(meta_path.read_text(encoding='utf-8'))

              for v in meta.get('versions', []):
                  version = v.get('version') or '?'
                  url = v.get('downloadUrl')
                  checksum = (v.get('checksum') or '').strip()

                  if not url:
                      errors.append(f'{ext_id} {version}: missing downloadUrl')
                      continue
                  if not checksum:
                      errors.append(f'{ext_id} {version}: missing checksum')
                      continue

                  normalized = checksum[7:] if checksum.lower().startswith('sha256:') else checksum
                  if not re.fullmatch(r'[A-Fa-f0-9]{64}', normalized):
                      errors.append(f'{ext_id} {version}: invalid checksum format')
                      continue

                  try:
                      with urllib.request.urlopen(url, timeout=120) as r:
                          payload = r.read()
                  except Exception as ex:
                      errors.append(f'{ext_id} {version}: failed to download release asset: {ex}')
                      continue

                  actual = hashlib.sha256(payload).hexdigest().lower()
                  if actual != normalized.lower():
                      errors.append(f'{ext_id} {version}: checksum mismatch expected={normalized.lower()} actual={actual}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)

          print('All release assets exist and checksums match')
          PY

      - name: Auto-sync metadata and index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import urllib.request
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          changed = False
          extension_ids = []

          def write_json(path, data):
              path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')

          for meta_path in sorted(pathlib.Path('extensions').glob('*/metadata.json')):
              ext_id = meta_path.parent.name
              meta = json.loads(meta_path.read_text(encoding='utf-8'))
              meta_changed = False
              extension_ids.append(ext_id)

              if meta.get('id') != ext_id:
                  meta['id'] = ext_id
                  meta_changed = True

              source_manifest_url = meta.get('sourceManifestUrl')
              if source_manifest_url:
                  try:
                      with urllib.request.urlopen(source_manifest_url, timeout=60) as r:
                          source_manifest = json.loads(r.read().decode('utf-8'))

                      sync_fields = ['name', 'description', 'author', 'url', 'categories', 'minCoveVersion']
                      for field in sync_fields:
                          if source_manifest.get(field) is not None and meta.get(field) != source_manifest.get(field):
                              meta[field] = source_manifest[field]
                              meta_changed = True
                  except Exception:
                      pass

              for v in meta.get('versions', []):
                  if not v.get('releasedAt'):
                      v['releasedAt'] = now
                      meta_changed = True
                  if not v.get('minCoveVersion') and meta.get('minCoveVersion'):
                      v['minCoveVersion'] = meta['minCoveVersion']
                      meta_changed = True

              if meta_changed:
                  write_json(meta_path, meta)
                  changed = True

          index_path = pathlib.Path('index.json')
          generated = {
              'schemaVersion': '2.0',
              'extensions': [{'id': ext_id} for ext_id in sorted(set(extension_ids))]
          }
          existing = json.loads(index_path.read_text(encoding='utf-8')) if index_path.exists() else {}
          if existing != generated:
              write_json(index_path, generated)
              changed = True

          print(f'Registry sync complete at {now}; changed={changed}')
          PY

      - name: Commit sync changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: sync registry metadata and index"
          git push
